<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Supply Chain Guard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand-primary: #4f46e5; --brand-secondary: #4338ca; --bg-body: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Giao diện chuẩn chung */
        .navbar-custom { background: rgba(79, 70, 229, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .auth-wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { width: 100%; max-width: 400px; border-radius: 1rem; border: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); background: #fff;}
        .btn-brand { background-color: var(--brand-primary); border-color: var(--brand-primary); color: white; font-weight: 600; }
        .btn-brand:hover { background-color: var(--brand-secondary); border-color: var(--brand-secondary); color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm sticky-top">
        <div class="container-lg">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <div class="bg-white rounded-circle p-1 me-2 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                    <i class="fa-solid fa-shield-halved text-primary fs-6"></i>
                </div>
                GuardPro
            </a>
            <div class="d-flex">
                <a href="/register" class="btn btn-light btn-sm px-4 fw-bold rounded-pill shadow-sm" style="color: var(--brand-primary);">Đăng ký ngay</a>
            </div>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="card auth-card p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-lock mb-3" style="font-size: 3rem; color: var(--brand-primary);"></i>
                <h2 class="h4 fw-bold text-dark mb-1">Đăng nhập hệ thống</h2>
                <p class="small text-muted">Truy cập Workspace của Tổ chức</p>
            </div>

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center p-3 mb-4 rounded-3 shadow-sm border-0 bg-danger-subtle text-danger" role="alert">
                <i class="fa-solid fa-triangle-exclamation me-2"></i>
                <div class="small fw-semibold">{{ error }}</div>
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Email làm việc</label>
                    <input type="email" name="email" class="form-control form-control-lg bg-light fs-6" placeholder="you@company.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Mật khẩu</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-light fs-6" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-brand btn-lg w-100 fs-6 rounded-pill shadow-sm">
                    Đăng nhập <i class="fa-solid fa-arrow-right ms-1"></i>
                </button>
            </form>

            <div class="text-center mt-4 pt-4 border-top">
                <small class="text-muted">Chưa có tài khoản? <a href="/register" class="fw-bold text-decoration-none" style="color: var(--brand-primary);">Tạo Workspace mới</a></small>
            </div>
        </div>
    </main>
</body>
</html>
